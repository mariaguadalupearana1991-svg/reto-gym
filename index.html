<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Reto Gym 2025</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; min-height: 100vh; color: #1a1a1a; }
  .app { max-width: 480px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

  /* Header */
  .header { text-align: center; margin-bottom: 1.5rem; }
  .title { font-size: 22px; font-weight: 600; color: #1a1a1a; }
  .subtitle { font-size: 13px; color: #888; margin-top: 4px; }
  .prize { display: inline-block; margin-top: 10px; background: #FAC775; color: #633806; font-size: 13px; font-weight: 600; padding: 4px 18px; border-radius: 20px; }

  /* Cards */
  .card { background: #fff; border: 1px solid #e8e8e4; border-radius: 14px; padding: 1rem 1.25rem; }
  .card-gray { background: #f0efea; border-radius: 14px; padding: 1rem 1.25rem; }

  /* Login */
  .login-wrap { max-width: 320px; margin: 2rem auto; background: #fff; border: 1px solid #e8e8e4; border-radius: 16px; padding: 1.5rem; }
  .login-title { font-size: 17px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
  .login-sub { font-size: 13px; color: #888; margin-bottom: 1.25rem; }
  .name-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1rem; }
  .name-btn { padding: 14px 8px; border: 2px solid #e0e0dc; border-radius: 12px; background: #fff; color: #1a1a1a; font-size: 14px; font-weight: 600; cursor: pointer; text-align: center; transition: all 0.15s; }
  .name-btn:active { transform: scale(0.97); }
  .name-btn.sel0 { border-color: #378ADD; background: #E6F1FB; color: #185FA5; }
  .name-btn.sel1 { border-color: #1D9E75; background: #E1F5EE; color: #0F6E56; }
  .or-row { text-align: center; font-size: 12px; color: #aaa; margin: 10px 0; }
  .text-input { width: 100%; padding: 10px 12px; font-size: 14px; border: 1px solid #ddd; border-radius: 10px; background: #fff; color: #1a1a1a; margin-bottom: 10px; -webkit-appearance: none; }
  .text-input:focus { outline: none; border-color: #378ADD; }
  .primary-btn { width: 100%; padding: 12px; background: #185FA5; color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
  .primary-btn:disabled { opacity: 0.4; cursor: default; }
  .primary-btn:not(:disabled):active { background: #0C447C; }

  /* Tabs */
  .tabs { display: flex; background: #fff; border: 1px solid #e8e8e4; border-radius: 12px; overflow: hidden; margin-bottom: 1.25rem; }
  .tab { flex: 1; padding: 10px 0; text-align: center; font-size: 13px; font-weight: 500; cursor: pointer; background: transparent; color: #888; border: none; transition: all 0.15s; }
  .tab.active { background: #f0efea; color: #1a1a1a; font-weight: 600; }
  .section { display: none; }
  .section.active { display: block; }

  /* Check-in */
  .checkin-box { text-align: center; padding: 1.5rem 1rem; margin-bottom: 1rem; }
  .checkin-day { font-size: 13px; color: #888; margin-bottom: 10px; }
  .checkin-btn { display: inline-block; padding: 13px 30px; border-radius: 14px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .checkin-btn:active { transform: scale(0.97); }
  .checkin-btn.go { background: #185FA5; color: #fff; }
  .checkin-btn.done { background: #E1F5EE; color: #085041; cursor: default; }
  .checkin-btn.setup { background: #FAC775; color: #633806; }
  .checkin-btn.loading { background: #f0efea; color: #888; cursor: default; }

  /* GPS status */
  .gps-status { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 10px; font-size: 12px; margin-bottom: 12px; }
  .gps-ok { background: #E1F5EE; color: #085041; }
  .gps-none { background: #FAEEDA; color: #633806; }
  .gps-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .gps-change { margin-left: auto; font-size: 11px; color: #888; background: none; border: none; cursor: pointer; }

  /* Calendar */
  .month-title { font-size: 13px; font-weight: 600; color: #888; margin-bottom: 5px; }
  .day-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; margin-bottom: 1rem; }
  .day-label { font-size: 10px; color: #bbb; text-align: center; padding-bottom: 3px; }
  .day-cell { aspect-ratio: 1; border-radius: 4px; border: 1px solid #e8e8e4; display: flex; align-items: center; justify-content: center; font-size: 9px; color: #bbb; background: #fff; }
  .day-cell.future { opacity: 0.3; }
  .day-cell.p0 { background: #B5D4F4; border-color: #B5D4F4; color: #0C447C; }
  .day-cell.p1 { background: #9FE1CB; border-color: #9FE1CB; color: #085041; }
  .day-cell.both { background: linear-gradient(135deg,#B5D4F4 50%,#9FE1CB 50%); border-color: #ccc; }
  .legend { display: flex; gap: 12px; margin-bottom: 10px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #888; }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; }

  /* Score */
  .score-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; align-items: center; margin-bottom: 1rem; }
  .score-num { font-size: 36px; font-weight: 700; }
  .breakdown-row { display: grid; grid-template-columns: 1fr 80px 80px; gap: 8px; align-items: center; padding: 9px 0; border-bottom: 1px solid #eeeeea; }
  .breakdown-row:last-child { border-bottom: none; }

  /* Metrics */
  .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
  .form-group label { font-size: 12px; color: #888; font-weight: 500; }
  .form-group input { padding: 9px 12px; font-size: 14px; border: 1px solid #ddd; border-radius: 10px; background: #fff; color: #1a1a1a; -webkit-appearance: none; }
  .form-group input:focus { outline: none; border-color: #378ADD; }
  .save-btn { padding: 10px 22px; background: #185FA5; color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; }

  /* Modal */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: flex-end; justify-content: center; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
  .modal { background: #fff; border-radius: 20px 20px 0 0; padding: 1.5rem; width: 100%; max-width: 480px; }
  .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 8px; color: #1a1a1a; }
  .modal-sub { font-size: 14px; color: #666; margin-bottom: 1.25rem; line-height: 1.5; }
  .modal-btns { display: flex; gap: 8px; }
  .modal-btn { flex: 1; padding: 12px; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; border: 1px solid #ddd; background: #fff; color: #1a1a1a; }
  .modal-btn.primary { background: #185FA5; color: #fff; border-color: #185FA5; }
  .modal-btn:active { opacity: 0.85; }

  /* Winner */
  .winner-banner { text-align: center; padding: 1.25rem; background: #FAC775; border-radius: 14px; margin-bottom: 1rem; }

  /* Toast */
  .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: #fff; padding: 10px 22px; border-radius: 20px; font-size: 13px; font-weight: 500; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 200; white-space: nowrap; }
  .toast.show { opacity: 1; }

  /* User badge */
  .user-badge { display: inline-block; padding: 3px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; }

  /* Loading */
  .loading-screen { text-align: center; padding: 4rem 1rem; color: #888; font-size: 15px; }
  .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid #e0e0dc; border-top-color: #185FA5; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 1rem; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="title">Reto gym 2025</div>
    <div class="subtitle">1 abril — 31 agosto · 153 días</div>
    <div class="prize">$5,000 MXN en juego</div>
  </div>
  <div id="view-loading" class="loading-screen"><div class="spinner"></div><br>Cargando...</div>
  <div id="view-login" style="display:none;"></div>
  <div id="view-main" style="display:none;"></div>
</div>
<div class="toast" id="toast"></div>
<div id="modal-wrap"></div>

<script>
// ─── CONFIG ────────────────────────────────────────────────────
const STORAGE_KEY = "gym_reto_gps_v1";
const MAX_DIST    = 50; // metros
const START       = new Date(2025,3,1);
const END         = new Date(2025,7,31);
const TODAY       = new Date();
const MNAMES      = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const DNAMES      = ['L','M','X','J','V','S','D'];

// Base de datos simple usando localStorage con clave compartida simulada
// (En producción real se reemplazaría por Firebase/Supabase)
// Aquí usamos localStorage pero con sincronización manual via exportar/importar
let appState = { attendance:{}, metrics:{inicial:{},final:{}}, players:[], gyms:{} };
let currentUser = null;

// ─── STORAGE ───────────────────────────────────────────────────
// Intentar usar window.storage (Claude env) o caer en localStorage
async function loadState() {
  try {
    if (window.storage) {
      const r = await window.storage.get(STORAGE_KEY, true);
      if (r && r.value) { appState = JSON.parse(r.value); return; }
    }
  } catch(e) {}
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) appState = JSON.parse(s);
  } catch(e) {}
}

async function saveState() {
  const json = JSON.stringify(appState);
  try {
    if (window.storage) { await window.storage.set(STORAGE_KEY, json, true); }
  } catch(e) {}
  try { localStorage.setItem(STORAGE_KEY, json); } catch(e) {}
}

// ─── UTILS ─────────────────────────────────────────────────────
function dateKey(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function todayKey() { return dateKey(TODAY); }

function haversine(lat1,lon1,lat2,lon2) {
  const R=6371000, r=Math.PI/180;
  const dLat=(lat2-lat1)*r, dLon=(lon2-lon1)*r;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*r)*Math.cos(lat2*r)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function showToast(msg, dur=2800) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), dur);
}

function showModal(html) { document.getElementById('modal-wrap').innerHTML=html; }
function closeModal() { document.getElementById('modal-wrap').innerHTML=''; }

function playerColor(name) {
  const i = appState.players.indexOf(name);
  if (i===0) return {bg:'#E6F1FB',color:'#185FA5',cell:'p0',hex:'#185FA5'};
  if (i===1) return {bg:'#E1F5EE',color:'#0F6E56',cell:'p1',hex:'#0F6E56'};
  return {bg:'#f0efea',color:'#444',cell:'p0',hex:'#444'};
}

// ─── LOGIN ─────────────────────────────────────────────────────
function renderLogin() {
  document.getElementById('view-loading').style.display='none';
  document.getElementById('view-login').style.display='';
  const known = appState.players || [];
  document.getElementById('view-login').innerHTML = `
    <div class="login-wrap">
      <div class="login-title">¿Quién eres?</div>
      <div class="login-sub">Elige tu nombre para registrar tu progreso</div>
      ${known.length ? `
        <div class="name-grid" id="name-btns">
          ${known.map((n,i)=>`<button class="name-btn" onclick="selectKnown('${n}',${i})">${n}</button>`).join('')}
        </div>
        <div class="or-row">— o entra con un nombre nuevo —</div>
      ` : ''}
      <input class="text-input" id="inp-custom" placeholder="Escribe tu nombre..." oninput="onCustom(this.value)" autocomplete="off">
      <button class="primary-btn" id="enter-btn" disabled onclick="enterApp()">Entrar al reto ›</button>
    </div>`;
  window._pendingName = null;
}

window.selectKnown = (name, idx) => {
  window._pendingName = name;
  document.getElementById('inp-custom').value = '';
  document.querySelectorAll('.name-btn').forEach((b,i) => {
    b.className = 'name-btn' + (i===idx ? ' sel'+i : '');
  });
  document.getElementById('enter-btn').disabled = false;
};

window.onCustom = (val) => {
  window._pendingName = val.trim();
  document.querySelectorAll('.name-btn').forEach(b => b.className='name-btn');
  document.getElementById('enter-btn').disabled = val.trim().length < 2;
};

window.enterApp = async () => {
  const name = window._pendingName;
  if (!name || name.length < 2) return;
  currentUser = name;
  if (!appState.players.includes(name)) { appState.players.push(name); await saveState(); }
  document.getElementById('view-login').style.display = 'none';
  document.getElementById('view-main').style.display = '';
  renderMain();
};

// ─── MAIN ──────────────────────────────────────────────────────
function renderMain() {
  const c = playerColor(currentUser);
  document.getElementById('view-main').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;">
      <span class="user-badge" style="background:${c.bg};color:${c.color};">${currentUser}</span>
      <button style="font-size:12px;color:#888;background:none;border:none;cursor:pointer;padding:4px 8px;" onclick="logout()">Cambiar usuario</button>
    </div>
    <div class="tabs">
      <button class="tab active" id="t-asis" onclick="switchTab('asistencia')">Asistencia</button>
      <button class="tab" id="t-metr" onclick="switchTab('metricas')">Métricas</button>
      <button class="tab" id="t-marc" onclick="switchTab('marcador')">Marcador</button>
    </div>
    <div class="section active" id="tab-asistencia"></div>
    <div class="section" id="tab-metricas"></div>
    <div class="section" id="tab-marcador"></div>`;
  renderAsistencia();
  renderMetricas();
  renderMarcador();
}

function switchTab(name) {
  ['asistencia','metricas','marcador'].forEach(n => {
    const id = n==='asistencia'?'asis':n==='metricas'?'metr':'marc';
    document.getElementById('t-'+id).classList.toggle('active', n===name);
    document.getElementById('tab-'+n).classList.toggle('active', n===name);
  });
  if (name==='marcador') renderMarcador();
}

// ─── ASISTENCIA ────────────────────────────────────────────────
function renderAsistencia() {
  const el = document.getElementById('tab-asistencia');
  if (!el) return;
  const att = appState.attendance[todayKey()] || {};
  const checkedIn = att[currentUser];
  const gym = appState.gyms[currentUser];
  const players = appState.players;

  let checkinHtml;
  if (checkedIn) {
    const meta = att[currentUser+'_meta'] || {};
    checkinHtml = `
      <button class="checkin-btn done">✓ Registrado hoy</button>
      ${meta.dist!=null ? `<div style="font-size:11px;color:#aaa;margin-top:8px;">${meta.gymName||'Gym'} · ${Math.round(meta.dist)}m de distancia</div>` : ''}`;
  } else if (!gym) {
    checkinHtml = `
      <button class="checkin-btn setup" onclick="setupGym()">Configurar mi gym primero</button>
      <div style="font-size:11px;color:#aaa;margin-top:8px;">Solo se hace una vez</div>`;
  } else {
    checkinHtml = `
      <button class="checkin-btn go" id="btn-checkin" onclick="doCheckIn()">Registrar asistencia de hoy</button>
      <div style="font-size:11px;color:#aaa;margin-top:8px;">Verifica que estés en ${gym.name}</div>`;
  }

  let legendHtml = '';
  players.forEach((p,i) => {
    const bg = i===0?'#B5D4F4':'#9FE1CB';
    legendHtml += `<div class="legend-item"><div class="legend-dot" style="background:${bg};"></div>${p}</div>`;
  });
  if (players.length>=2) legendHtml += `<div class="legend-item"><div class="legend-dot" style="background:linear-gradient(135deg,#B5D4F4 50%,#9FE1CB 50%);"></div>Ambos</div>`;

  el.innerHTML = `
    <div class="card checkin-box" style="margin-bottom:1rem;">
      <div class="checkin-day">${TODAY.toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long'})}</div>
      ${checkinHtml}
    </div>
    <div class="${gym?'gps-status gps-ok':'gps-status gps-none'}" style="margin-bottom:1rem;">
      <div class="gps-dot" style="background:${gym?'#1D9E75':'#BA7517'};"></div>
      ${gym ? `<span>Gym: <strong>${gym.name}</strong></span><button class="gps-change" onclick="setupGym()">Cambiar</button>` : 'Sin gym configurado'}
    </div>
    <div style="margin-bottom:1rem;">
      <div class="legend">${legendHtml}</div>
      <div id="calendar-wrap"></div>
    </div>
    <div style="display:grid;grid-template-columns:${players.length>=2?'1fr auto 1fr':'1fr'};gap:8px;align-items:center;margin-bottom:1rem;">
      ${players.map((p,i) => {
        const c = playerColor(p);
        const days = Object.values(appState.attendance).filter(a=>a[p]===true).length;
        const g = appState.gyms[p];
        return `<div class="card" style="text-align:center;${i===0&&players.length>=2?'border-color:'+c.hex+';border-width:2px;':''}">
          <div style="font-size:13px;color:${c.hex};font-weight:600;">${p}</div>
          <div style="font-size:32px;font-weight:700;color:#1a1a1a;">${days}</div>
          <div style="font-size:11px;color:#888;">días asistidos</div>
          ${g?`<div style="font-size:10px;color:#bbb;margin-top:4px;">${g.name}</div>`:''}
        </div>`;
      }).join(players.length>=2?'<div style="text-align:center;color:#ccc;font-size:18px;font-weight:700;">VS</div>':'')}
    </div>
    <div style="text-align:center;">
      <button onclick="syncData()" style="font-size:12px;color:#888;background:none;border:1px solid #ddd;border-radius:8px;padding:6px 14px;cursor:pointer;">Sincronizar datos</button>
    </div>`;
  buildCalendar();
}

function buildCalendar() {
  const wrap = document.getElementById('calendar-wrap');
  if (!wrap) return;
  wrap.innerHTML = '';
  const months = [];
  let cur = new Date(START);
  while (cur <= END) {
    const m=cur.getMonth(), y=cur.getFullYear();
    if (!months.length || months[months.length-1].month!==m) months.push({month:m,year:y,days:[]});
    months[months.length-1].days.push(new Date(cur));
    cur.setDate(cur.getDate()+1);
  }
  const [p0,p1] = appState.players;
  months.forEach(mn => {
    const div = document.createElement('div');
    div.innerHTML = `<div class="month-title">${MNAMES[mn.month]}</div>`;
    const grid = document.createElement('div'); grid.className='day-grid';
    DNAMES.forEach(d => { const l=document.createElement('div');l.className='day-label';l.textContent=d;grid.appendChild(l); });
    const first=mn.days[0].getDay(), off=first===0?6:first-1;
    for(let i=0;i<off;i++) grid.appendChild(document.createElement('div'));
    mn.days.forEach(day => {
      const k=dateKey(day), att=appState.attendance[k]||{};
      const cell=document.createElement('div'); cell.className='day-cell';
      if(day>TODAY) cell.classList.add('future');
      if(p0&&p1&&att[p0]&&att[p1]) cell.classList.add('both');
      else if(p0&&att[p0]) cell.classList.add('p0');
      else if(p1&&att[p1]) cell.classList.add('p1');
      cell.textContent=day.getDate();
      grid.appendChild(cell);
    });
    div.appendChild(grid);
    wrap.appendChild(div);
  });
}

// ─── GYM SETUP ─────────────────────────────────────────────────
window.setupGym = () => {
  showModal(`
    <div class="modal-bg" onclick="closeModal()">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-title">Configura tu gym</div>
        <div class="modal-sub">Escribe el nombre de tu gym y toca el botón estando <strong>dentro del gym</strong>. Esto se guarda una sola vez.</div>
        <div class="form-group">
          <label>Nombre del gym</label>
          <input class="text-input" id="gym-name-inp" placeholder="ej. Smart Fit Satélite" style="margin-bottom:0;" autocomplete="off">
        </div>
        <div id="gym-loc-st" style="font-size:12px;color:#888;min-height:18px;margin-bottom:12px;"></div>
        <div class="modal-btns">
          <button class="modal-btn" onclick="closeModal()">Cancelar</button>
          <button class="modal-btn primary" onclick="captureGymLocation()">Usar ubicación actual</button>
        </div>
      </div>
    </div>`);
};

window.captureGymLocation = () => {
  const name = (document.getElementById('gym-name-inp').value||'').trim();
  if (!name) { document.getElementById('gym-loc-st').textContent='Escribe el nombre primero.'; return; }
  const st = document.getElementById('gym-loc-st');
  st.textContent = 'Obteniendo GPS...';
  if (!navigator.geolocation) { st.textContent='Tu navegador no soporta GPS.'; return; }
  navigator.geolocation.getCurrentPosition(async pos => {
    appState.gyms[currentUser] = { name, lat:pos.coords.latitude, lon:pos.coords.longitude };
    await saveState();
    closeModal();
    showToast('✓ Gym guardado: '+name);
    renderAsistencia();
  }, () => {
    st.textContent='No se pudo obtener la ubicación. Revisa los permisos del navegador.';
  }, { enableHighAccuracy:true, timeout:12000 });
};

// ─── CHECK IN ──────────────────────────────────────────────────
window.doCheckIn = () => {
  const gym = appState.gyms[currentUser];
  if (!gym) { showToast('Primero configura tu gym'); return; }
  const btn = document.getElementById('btn-checkin');
  if (btn) { btn.className='checkin-btn loading'; btn.textContent='Verificando ubicación...'; }
  if (!navigator.geolocation) { showToast('Tu navegador no soporta GPS'); return; }
  navigator.geolocation.getCurrentPosition(async pos => {
    const dist = haversine(pos.coords.latitude, pos.coords.longitude, gym.lat, gym.lon);
    if (dist > MAX_DIST) {
      if (btn) { btn.className='checkin-btn go'; btn.textContent='Registrar asistencia de hoy'; }
      showModal(`
        <div class="modal-bg" onclick="closeModal()">
          <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-title">Muy lejos del gym</div>
            <div class="modal-sub">Estás a <strong>${Math.round(dist)} metros</strong> de ${gym.name}. El máximo permitido es ${MAX_DIST}m.<br><br>Intenta de nuevo cuando estés dentro del gym.</div>
            <div class="modal-btns">
              <button class="modal-btn primary" onclick="closeModal()">Entendido</button>
            </div>
          </div>
        </div>`);
      return;
    }
    const key = todayKey();
    if (!appState.attendance[key]) appState.attendance[key] = {};
    appState.attendance[key][currentUser] = true;
    appState.attendance[key][currentUser+'_meta'] = { dist:Math.round(dist), gymName:gym.name, ts:Date.now() };
    await saveState();
    showToast('✓ Asistencia verificada — '+Math.round(dist)+'m');
    renderAsistencia();
  }, () => {
    if (btn) { btn.className='checkin-btn go'; btn.textContent='Registrar asistencia de hoy'; }
    showToast('No se pudo obtener tu ubicación. Revisa permisos.');
  }, { enableHighAccuracy:true, timeout:12000 });
};

// ─── SYNC ──────────────────────────────────────────────────────
window.syncData = async () => {
  showToast('Sincronizando...');
  await loadState();
  renderAsistencia();
  showToast('✓ Datos actualizados');
};

// ─── MÉTRICAS ─────────────────────────────────────────────────
function renderMetricas() {
  const el = document.getElementById('tab-metricas');
  if (!el) return;
  const players = appState.players;
  window._regType = 'inicial';
  el.innerHTML = `
    <div class="card-gray" style="margin-bottom:1rem;">
      <div style="font-size:15px;font-weight:600;color:#1a1a1a;margin-bottom:12px;">Tu medición</div>
      <div style="display:flex;gap:8px;margin-bottom:14px;">
        <button class="tab active" id="btn-ini" style="border:1px solid #ddd;border-radius:10px;flex:1;" onclick="setReg('inicial',this)">Inicial</button>
        <button class="tab" id="btn-fin" style="border:1px solid #ddd;border-radius:10px;flex:1;" onclick="setReg('final',this)">Final</button>
      </div>
      <div class="form-group"><label>% de grasa</label><input type="number" id="inp-grasa" placeholder="ej. 18.5" step="0.1" inputmode="decimal"></div>
      <div class="form-group"><label>% de masa muscular</label><input type="number" id="inp-musculo" placeholder="ej. 38.0" step="0.1" inputmode="decimal"></div>
      <button class="save-btn" onclick="saveMetrics()">Guardar medición</button>
    </div>
    <div style="font-size:15px;font-weight:600;color:#1a1a1a;margin-bottom:10px;">Comparativa de cambio</div>
    <div class="card-gray">
      <div style="display:grid;grid-template-columns:90px 1fr 1fr;gap:8px;margin-bottom:10px;font-size:11px;color:#aaa;">
        <div></div>
        ${players.map(p=>{const c=playerColor(p);return `<div style="text-align:center;font-weight:700;color:${c.hex};">${p}</div>`;}).join('')}
      </div>
      ${['grasa','musculo'].map(metric => {
        const label = metric==='grasa'?'% grasa':'% músculo';
        return `<div style="display:grid;grid-template-columns:90px 1fr 1fr;gap:8px;align-items:center;margin-bottom:8px;">
          <div style="font-size:12px;color:#888;">${label}</div>
          ${players.map(p => {
            const c=playerColor(p);
            const iv=(appState.metrics.inicial[p]||{})[metric];
            const fv=(appState.metrics.final[p]||{})[metric];
            if(fv!=null&&iv!=null){
              const diff=fv-iv, good=metric==='grasa'?diff<0:diff>0;
              return `<div class="card" style="text-align:center;padding:8px;">
                <div style="font-size:16px;font-weight:700;color:${c.hex};">${fv.toFixed(1)}%</div>
                <div style="font-size:10px;color:${good?'#0F6E56':'#A32D2D'};">${diff>0?'+':''}${diff.toFixed(1)}pp</div>
              </div>`;
            } else if(iv!=null){
              return `<div class="card" style="text-align:center;padding:8px;">
                <div style="font-size:16px;font-weight:700;color:${c.hex};">${iv.toFixed(1)}%</div>
                <div style="font-size:10px;color:#aaa;">inicial</div>
              </div>`;
            }
            return `<div class="card" style="text-align:center;padding:8px;color:#bbb;font-size:13px;">—</div>`;
          }).join('')}
        </div>`;
      }).join('')}
    </div>`;
  setReg('inicial', document.getElementById('btn-ini'));
}

window.setReg = (type, btn) => {
  window._regType = type;
  document.querySelectorAll('#tab-metricas .tab').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  const data = (appState.metrics[type]||{})[currentUser]||{};
  const ig=document.getElementById('inp-grasa'), im=document.getElementById('inp-musculo');
  if(ig) ig.value=data.grasa||'';
  if(im) im.value=data.musculo||'';
};

window.saveMetrics = async () => {
  const type=window._regType;
  if(!appState.metrics[type]) appState.metrics[type]={};
  const g=parseFloat(document.getElementById('inp-grasa').value)||null;
  const m=parseFloat(document.getElementById('inp-musculo').value)||null;
  appState.metrics[type][currentUser]={grasa:g,musculo:m};
  await saveState();
  showToast('✓ Métricas guardadas');
  renderMetricas();
};

// ─── MARCADOR ─────────────────────────────────────────────────
function renderMarcador() {
  const el = document.getElementById('tab-marcador');
  if (!el) return;
  const players = appState.players;
  if (players.length < 2) {
    el.innerHTML=`<div style="text-align:center;padding:3rem 1rem;color:#888;">Esperando al segundo jugador...<br><br><small>Comparte el link para que tu amigo entre.</small></div>`;
    return;
  }
  const [p0,p1] = players;
  const c0=playerColor(p0), c1=playerColor(p1);
  const d0=Object.values(appState.attendance).filter(a=>a[p0]===true).length;
  const d1=Object.values(appState.attendance).filter(a=>a[p1]===true).length;
  const asisWin=d0>d1?p0:d1>d0?p1:null;

  function metricWin(metric,invert){
    const i0=(appState.metrics.inicial[p0]||{})[metric], f0=(appState.metrics.final[p0]||{})[metric];
    const i1=(appState.metrics.inicial[p1]||{})[metric], f1=(appState.metrics.final[p1]||{})[metric];
    if(i0==null||f0==null||i1==null||f1==null) return null;
    const a=invert?i0-f0:f0-i0, b=invert?i1-f1:f1-i1;
    return a>b?p0:b>a?p1:null;
  }
  const grasaWin=metricWin('grasa',true);
  const muscWin=metricWin('musculo',false);
  const s0=(asisWin===p0?1:0)+(grasaWin===p0?1:0)+(muscWin===p0?1:0);
  const s1=(asisWin===p1?1:0)+(grasaWin===p1?1:0)+(muscWin===p1?1:0);
  const winner=s0>=2&&s0>s1?p0:s1>=2&&s1>s0?p1:null;

  function badge(win,p){
    if(!win) return '<span style="font-size:11px;color:#aaa;">pendiente</span>';
    return win===p?'<span style="font-size:11px;color:#0F6E56;font-weight:700;">✓ gana</span>':'<span style="font-size:11px;color:#A32D2D;">pierde</span>';
  }

  el.innerHTML=`
    ${winner?`<div class="winner-banner">
      <div style="font-size:24px;margin-bottom:6px;">🏆</div>
      <div style="font-size:18px;font-weight:700;color:#633806;">${winner} gana el reto</div>
      <div style="font-size:13px;color:#854F0B;margin-top:4px;">¡Se lleva los $5,000 MXN!</div>
    </div>`:''}
    <div class="score-grid" style="margin-bottom:1rem;">
      <div class="card" style="text-align:center;border-color:${c0.hex};border-width:2px;">
        <div style="font-size:13px;color:${c0.hex};font-weight:700;margin-bottom:4px;">${p0}</div>
        <div class="score-num" style="color:${c0.hex};">${s0}</div>
        <div style="font-size:11px;color:#888;">de 3 categorías</div>
      </div>
      <div style="text-align:center;color:#ccc;font-weight:700;">VS</div>
      <div class="card" style="text-align:center;">
        <div style="font-size:13px;color:${c1.hex};font-weight:700;margin-bottom:4px;">${p1}</div>
        <div class="score-num" style="color:${c1.hex};">${s1}</div>
        <div style="font-size:11px;color:#888;">de 3 categorías</div>
      </div>
    </div>
    <div class="card-gray">
      <div style="display:grid;grid-template-columns:1fr 80px 80px;gap:8px;font-size:11px;color:#aaa;margin-bottom:8px;">
        <div>Categoría</div>
        <div style="text-align:center;">${p0}</div>
        <div style="text-align:center;">${p1}</div>
      </div>
      <div class="breakdown-row">
        <div style="font-size:13px;">Asistencia al gym</div>
        <div style="text-align:center;">${badge(asisWin,p0)}<div style="font-size:10px;color:#aaa;">${d0} días</div></div>
        <div style="text-align:center;">${badge(asisWin,p1)}<div style="font-size:10px;color:#aaa;">${d1} días</div></div>
      </div>
      <div class="breakdown-row">
        <div style="font-size:13px;">Reducción de grasa</div>
        <div style="text-align:center;">${badge(grasaWin,p0)}</div>
        <div style="text-align:center;">${badge(grasaWin,p1)}</div>
      </div>
      <div class="breakdown-row">
        <div style="font-size:13px;">Ganancia muscular</div>
        <div style="text-align:center;">${badge(muscWin,p0)}</div>
        <div style="text-align:center;">${badge(muscWin,p1)}</div>
      </div>
    </div>
    <div style="text-align:center;margin-top:1rem;">
      <button onclick="syncData()" style="font-size:12px;color:#888;background:none;border:1px solid #ddd;border-radius:8px;padding:6px 14px;cursor:pointer;">Actualizar marcador</button>
    </div>`;
}

function logout() {
  currentUser=null;
  document.getElementById('view-main').style.display='none';
  document.getElementById('view-login').style.display='';
  renderLogin();
}

// ─── INIT ──────────────────────────────────────────────────────
(async()=>{
  await loadState();
  document.getElementById('view-loading').style.display='none';
  renderLogin();
})();
</script>
</body>
</html>
